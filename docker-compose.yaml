services:
  todoapp:
    build:
      context: ${PROJECT_ROOT:-.}
      dockerfile: ${PROJECT_ROOT:-.}/cmd/todoapp/Dockerfile
    container_name: todoapp
    depends_on:
      todoapp-postgres:
        condition: service_healthy
      todoapp-postgres-migrate: 
        condition: service_completed_successfully
      todoapp-redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=todoapp-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - REDIS_HOST=todoapp-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - REDIS_TTL=${REDIS_TTL}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/.out/logs
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - HTTP_ALLOWED_ORIGINS=${HTTP_ALLOWED_ORIGINS}
      - TIME_ZONE=${TIME_ZONE}
    volumes:
      - ${PROJECT_ROOT:-.}/.out/logs:/app/.out/logs
    ports:
      - "5050:5050"
    restart: always

  web-server:
    image: caddy:2.11.1-alpine
    container_name: web-server
    depends_on:
      todoapp:
        condition: service_started
    environment:
      - CADDY_HOST=${CADDY_HOST:-localhost}
    volumes:
      - ${PROJECT_ROOT:-.}/web/Caddyfile:/etc/caddy/Caddyfile
      - ${PROJECT_ROOT:-.}/.out/caddy_data:/data
      - ${PROJECT_ROOT:-.}/web/public:/web/public
    ports:
      - "80:80"
      - "443:443"
    restart: always

  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT:-.}/.out/pgdata:/var/lib/postgresql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:       
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  todoapp-redis:
    image: redis:8.6.1
    container_name: todoapp-env-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${PROJECT_ROOT:-.}/.out/redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always


  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: todoapp-postgres-migrate
    volumes:
      - ${PROJECT_ROOT:-.}/migrations:/migrations
    command: ["-path=/migrations/", "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"]
    depends_on:
      todoapp-postgres:
        condition: service_healthy

  swagger:
    build:
      context: ${PROJECT_ROOT:-.}
      dockerfile_inline: |
        FROM golang:1.26.2-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    environment:
      - GOFLAGS=-buildvcs=false
    volumes:
      - ${PROJECT_ROOT:-.}:/code
  
