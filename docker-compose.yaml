services:
  todoapp:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/todoapp/Dockerfile
    container_name: todoapp
    depends_on:
      todoapp-postgres:
        condition: service_healthy
      todoapp-postgres-migrate: 
        condition: service_completed_successfully
    environment:
      - POSTGRES_HOST=todoapp-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/.out/logs
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - HTTP_ALLOWED_ORIGINS=${HTTP_ALLOWED_ORIGINS}
      - TIME_ZONE=${TIME_ZONE}
    volumes:
      - ${PROJECT_ROOT}/.out/logs:/app/.out/logs
    ports:
      - "5050:5050"
    restart: always
  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/.out/pgdata:/var/lib/postgresql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:       
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: todoapp-postgres-migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    command: ["-path=/migrations/", "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up"]
    depends_on:
      todoapp-postgres:
        condition: service_healthy